# Nginx + Certbot para botgod.pro
# 1. Copia a /etc/nginx/sites-available/botgod.pro
# 2. ln -s ... sites-enabled/
# 3. certbot --nginx -d botgod.pro -d www.botgod.pro

server {
    listen 80;
    listen [::]:80;
    server_name botgod.pro www.botgod.pro;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://botgod.pro$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name botgod.pro;

    # ssl_certificate     /etc/letsencrypt/live/botgod.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/botgod.pro/privkey.pem;

    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:3847;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

server {
    listen 443 ssl http2;
    server_name www.botgod.pro;
    # ssl_certificate     /etc/letsencrypt/live/botgod.pro/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/botgod.pro/privkey.pem;
    return 301 https://botgod.pro$request_uri;
}
