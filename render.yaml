# Render Blueprint — God Bot (botgod.pro)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: god-bot
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DOMAIN
        value: botgod.pro
      - key: DASHBOARD_URL
        value: https://panel.botgod.pro
      - key: API_PUBLIC_URL
        value: https://panel.botgod.pro
      - key: COOKIE_SECURE
        value: "true"
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: GUILD_ID
        sync: false
      - key: OWNER_IDS
        sync: false
      - key: INTERACTIONS_PUBLIC_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        value: godbot-d5aa2
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_STORAGE_BUCKET
        value: godbot-d5aa2.firebasestorage.app